<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Mi Página Web</title>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Poor+Story&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div class="contenedor">
            <img class="avatar" src="https://i.pravatar.cc/150">
            <h1>Mi primera página Web</h1>
            <h2>Desarrollador Frontend en formación</h2>
            <p class="mi-caja">Quiero aprender como crear una página web profesional de inicio a fin</p>
            <a href="#">Sígueme en GitHub</a>
            <form id="mi-formulario">
                <label for="email-user">Suscríbete</label>
                <input id="email-user" type="email" required placeholder="Tu correo aquí...">
                <button>Enviar</button>
            </form>
            <p id="mensaje-exitoso"></p>
        </div>
        <script src="script.js"></script>
    </body>
</html>
